name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to attach binaries to the GitHub release

jobs:
  # Phase 1 of the release: build sqld for each target on the matching native
  # runner. Each job uploads its sqld-<go-os>-<go-arch>[.exe] artifact, which
  # the build-go job collects into internal/sqld/bin/ before the Go cross-build.
  build-sqld:
    name: build sqld (${{ matrix.go_os }}/${{ matrix.go_arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            go_os: linux
            go_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            go_os: linux
            go_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            # cross-compile via apt-installed aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
            cargo_linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          - runner: macos-13   # Intel runner; Apple-Silicon runners can also cross-compile this target if macos-13 is retired
            go_os: darwin
            go_arch: amd64
            rust_target: x86_64-apple-darwin
          - runner: macos-latest   # Apple Silicon
            go_os: darwin
            go_arch: arm64
            rust_target: aarch64-apple-darwin
          # Windows is intentionally absent: libsql-server's libsql-wal dep
          # uses POSIX-only syscalls and does not compile on Windows. Upstream
          # also doesn't ship Windows release binaries. Windows users: WSL.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: install linker for cross-compile (linux only)
        if: matrix.apt_packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: install rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: cache cargo + target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: build/libsql -> target
          shared-key: sqld-${{ matrix.rust_target }}

      - name: setup go (for `go env GOOS/GOARCH` on Unix; not strictly needed since we pass GO_OS/GO_ARCH)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: build sqld
        env:
          # forward the linker override for cross-compile targets
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          make build-sqld-target \
            GO_OS=${{ matrix.go_os }} \
            GO_ARCH=${{ matrix.go_arch }} \
            RUST_TARGET=${{ matrix.rust_target }}

      - name: upload sqld binary
        uses: actions/upload-artifact@v4
        with:
          name: sqld-${{ matrix.go_os }}-${{ matrix.go_arch }}
          path: internal/sqld/bin/sqld-${{ matrix.go_os }}-${{ matrix.go_arch }}*
          retention-days: 7
          if-no-files-found: error

  # Phase 2: collect all 6 sqld binaries into internal/sqld/bin/, then Go
  # cross-build the sqlitedeploy CLI for every platform with each binary
  # embedded for its matching GOOS/GOARCH.
  build-go:
    name: cross-build sqlitedeploy CLI
    needs: build-sqld
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: derive version (strip leading v)
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "version: ${version}"

      - name: download all sqld artifacts into internal/sqld/bin/
        uses: actions/download-artifact@v4
        with:
          path: internal/sqld/bin/
          pattern: sqld-*
          merge-multiple: true

      - name: list embedded sqld binaries
        run: ls -lh internal/sqld/bin/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: cross-compile sqlitedeploy CLI
        run: make release VERSION=${{ steps.version.outputs.value }}

      - name: upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 7

  publish-npm:
    name: publish npm packages
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: stamp versions in manifests
        run: node scripts/stamp-versions.js ${{ needs.build-go.outputs.version }}

      - name: copy binaries into platform packages
        run: make package-npm

      - name: publish per-platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in packaging/npm/platforms/*/; do
            echo "publishing $dir"
            (cd "$dir" && npm publish --access public)
          done

      - name: publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm/sqlitedeploy
          npm publish --access public

  publish-pypi:
    name: publish pypi wheels
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install build tooling
        run: pip install hatch twine

      - name: download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: stamp version in pip manifests
        run: python3 scripts/stamp-versions.py ${{ needs.build-go.outputs.version }}

      - name: build all platform wheels
        run: make package-pip VERSION=${{ needs.build-go.outputs.version }}

      - name: upload wheels to pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload packaging/pip/dist/*.whl

  publish-maven:
    name: publish maven central artifacts
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: stamp version in pom.xml files
        run: node scripts/stamp-versions-maven.js ${{ needs.build-go.outputs.version }}

      - name: copy binaries into platform modules
        run: make prepare-maven VERSION=${{ needs.build-go.outputs.version }}

      - name: deploy to maven central (sonatype central portal)
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        working-directory: packaging/maven
        run: mvn -B -P release deploy

  github-release:
    name: attach binaries to github release
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: create release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
